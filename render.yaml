databases:
  - name: notetracker-db
    databaseName: notetracker
    user: notetracker_user
    plan: free

services:
  - type: web
    name: notetracker-app
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: notetracker-db
          property: connectionString
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
